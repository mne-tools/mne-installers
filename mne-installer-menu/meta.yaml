{% set python_min = "3.10" %}

package:
  name: "mne-installer-menu"
  version: "1.0.0"

build:
  number: 0
  noarch: python
  script:
    - pushd {{ RECIPE_DIR }}
    - python make_menu.py

requirements:
  host:
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
  # If we ever want to see why an installer-dependent package is pulled in, we can
  # cause it to be avoided using the same methods as "noqt" package:
  # run_constrained:
  #   - clang <0.0
  #   - clang-22 <0.0

test:
  requires:
    - python {{ python_min }}

about:
  home: http://mne.tools
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Menu entries for MNE-Python
  description: |
    This package provides various icons, configuration files and scripts for
    use with the MNE-Python environment installer.
  doc_url: http://mne.tools
  dev_url: https://github.com/mne-tools/mne-installer

extra:
  recipe-maintainers:
    - larsoner
    - hoechenberger

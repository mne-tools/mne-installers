# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.12.1"

package:
  name: mne-installer-menu
  version: ${{ version }}

build:
  number: 0
  noarch: python
  script:
    - pushd $RECIPE_DIR
    - python make_menu.py

# If we ever want to see why an installer-dependent package is pulled in during
# testing, we can cause it to be avoided using the same methods as "noqt" package:
#
# run_constraints:
#   - clang <0.0
#   - clang-22 <0.0

requirements:
  host:
    - python
    - conda
  run:
    - python

tests:
  - script:
      - python run_test.py
    requirements:
      run:
        - python
    files:
      recipe:
        - run_test.py

about:
  homepage: http://mne.tools
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Menu entries for MNE-Python
  description: |
    This package provides various icons, configuration files and scripts for
    use with the MNE-Python environment installer.
  documentation: http://mne.tools
  repository: https://github.com/mne-tools/mne-installer

extra:
  recipe-maintainers:
    - larsoner
